{% extends 'community/base.html' %}

{% block title %}비밀번호 변경 - 금융 자산 커뮤니티{% endblock %}

{% block content %}
<h1 class="page-title">비밀번호 변경</h1>

<form action="{% url 'accounts:change_password' %}" method="post" class="mt-4">
  {% csrf_token %}
  {{ form.as_p }}
  <div class="mt-4">
    <button type="submit" class="btn">변경하기</button>
  </div>
</form>
{% endblock %}
