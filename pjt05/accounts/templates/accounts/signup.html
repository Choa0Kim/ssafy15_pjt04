{% extends 'community/base.html' %}

{% block title %}회원가입 - 금융 자산 커뮤니티{% endblock %}

{% block extra_css %}
<style>
  /* 설문조사 라디오/체크박스 스타일링 */
  ul {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  ul li label {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 1rem 1.25rem;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-btn);
    background: var(--color-bg);
    cursor: pointer;
    transition: var(--transition);
    font-weight: 600;
    margin: 0;
  }
  ul li label:hover {
    border-color: var(--color-primary);
    background: var(--color-bg-card);
    box-shadow: 0 4px 12px rgba(0, 195, 137, 0.08);
  }
  input[type="radio"], input[type="checkbox"] {
    width: 1.2rem;
    height: 1.2rem;
    accent-color: var(--color-primary);
    cursor: pointer;
  }
</style>
{% endblock %}

{% block content %}
<h1 class="page-title">회원가입</h1>
<p class="text-muted mb-4">금융 자산 커뮤니티에 오신 것을 환영합니다.</p>

<form action="{% url 'accounts:signup' %}" method="post" enctype="multipart/form-data" class="mt-4">
  {% csrf_token %}
  {{ form.as_p }}
  <div class="mt-4">
    <button type="submit" class="btn" style="width: 100%; font-size: 1.1rem; padding: 1rem;">가입하기</button>
  </div>
</form>
{% endblock %}
