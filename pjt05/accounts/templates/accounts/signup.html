{% extends 'community/base.html' %}

{% block title %}회원가입 - 금융 자산 커뮤니티{% endblock %}

{% block content %}
<h1 class="page-title">회원가입</h1>
<p class="text-muted mb-4">금융 자산 커뮤니티에 오신 것을 환영합니다.</p>

<form action="{% url 'accounts:signup' %}" method="post" enctype="multipart/form-data" class="mt-4">
  {% csrf_token %}
  {{ form.as_p }}
  <div class="mt-4">
    <button type="submit" class="btn">가입하기</button>
  </div>
</form>
{% endblock %}
